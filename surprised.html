<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Gift 🎁</title>

    <link rel="stylesheet" href="gift.css">
    


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <a href="home.html" class="home-btn">🏠 Back to Home</a>



    <div class="background"></div>

    <div class="container">

        <h1 class="title">
            🎂 A Special Surprise 🎂
        </h1>

        <!-- Gift Box -->
        <div class="gift" id="gift">

            <div class="gift-lid">
                <div class="ribbon vertical"></div>
                <div class="ribbon horizontal"></div>

                <div class="bow bow-left"></div>
                <div class="bow bow-right"></div>
            </div>

            <div class="gift-box">
                <div class="ribbon vertical"></div>
                <div class="ribbon horizontal"></div>
            </div>

        </div>

        <!-- Blast Area -->
        <div class="blast" id="blast">

            <div class="heart">
                ❤️
            </div>

            <!-- Sparkles -->
            <span class="spark s1">✨</span>
            <span class="spark s2">✨</span>
            <span class="spark s3">✨</span>
            <span class="spark s4">✨</span>
            <span class="spark s5">✨</span>
            <span class="spark s6">✨</span>

        </div>

        <!-- Birthday Message -->
        <div class="message" id="message">

            <h1>Hello Johum ❤️</h1>

            <h2>🎉 Happy Birthday 🎉</h2>

            <p>
                May your life always be filled with happiness,
                laughter, endless smiles and beautiful memories.
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
